services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: evolution
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks: [internal]

  evolution:
    image: atendai/evolution-api:v2.1.1
    restart: unless-stopped
    depends_on: [postgres, redis]
    ports:
      - "127.0.0.1:8080:8080"   # só localhost; QR via túnel SSH
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution?schema=public
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/0
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      # sem webhook: o app puxa (PULL) na hora do resumo. Evolution persiste msgs no Postgres dele.
    networks: [internal]

  app:
    build: ./app
    restart: unless-stopped
    depends_on: [postgres, evolution]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution?schema=public
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
      EVOLUTION_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-default}
      DESTINO: ${DESTINO:-whatsapp_group}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      SUMMARY_CRON: ${SUMMARY_CRON:-0 18 * * *}
      TZ: ${TZ:-America/Sao_Paulo}
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
